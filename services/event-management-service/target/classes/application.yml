server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: event-management-service

  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/event_db}
    username: ${SPRING_DATASOURCE_USERNAME:event_user}
    password: ${SPRING_DATASOURCE_PASSWORD:event_pass}

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true

management:
  endpoints:
    web:
      exposure:
        include: health,info,prometheus
  endpoint:
    health:
      show-details: always
