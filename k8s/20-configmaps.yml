apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-config
  namespace: eventhub-gateway
  labels:
    app.kubernetes.io/name: kong
    app.kubernetes.io/part-of: eventhub
    app.kubernetes.io/component: gateway
    eventhub.io/role: gateway
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    services:
      - name: user-authentication-service
        url: http://user-authentication-service.eventhub-app.svc.cluster.local:8080
        routes:
          - name: auth-routes
            paths:
              - /auth
            strip_path: false

      - name: event-management-service
        url: http://event-management-service.eventhub-app.svc.cluster.local:8080
        routes:
          - name: event-routes
            paths:
              - /events
            strip_path: false

      - name: participation-service
        url: http://participation-service.eventhub-app.svc.cluster.local:8080
        routes:
          - name: participation-routes
            paths:
              - /participations
            strip_path: false
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: eventhub-observability
  labels:
    app.kubernetes.io/name: prometheus
    app.kubernetes.io/part-of: eventhub
    app.kubernetes.io/component: observability
    eventhub.io/role: observability
data:
  prometheus.yml: |
    global:
      scrape_interval: 10s
      evaluation_interval: 10s

    scrape_configs:
      - job_name: "user-authentication-service"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets:
              - "user-authentication-service.eventhub-app.svc.cluster.local:8080"

      - job_name: "event-management-service"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets:
              - "event-management-service.eventhub-app.svc.cluster.local:8080"

      - job_name: "participation-service"
        metrics_path: "/actuator/prometheus"
        static_configs:
          - targets:
              - "participation-service.eventhub-app.svc.cluster.local:8080"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasource
  namespace: eventhub-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: eventhub
    app.kubernetes.io/component: observability
    eventhub.io/role: observability
data:
  datasource.yml: |
    apiVersion: 1

    datasources:
      - name: Prometheus
        uid: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus.eventhub-observability.svc.cluster.local:9090
        isDefault: true
        editable: true
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard-provider
  namespace: eventhub-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: eventhub
    app.kubernetes.io/component: observability
    eventhub.io/role: observability
data:
  dashboard.yml: |
    apiVersion: 1

    providers:
      - name: EventHub
        orgId: 1
        folder: EventHub
        type: file
        disableDeletion: false
        editable: true
        options:
          path: /etc/grafana/dashboards
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboard
  namespace: eventhub-observability
  labels:
    app.kubernetes.io/name: grafana
    app.kubernetes.io/part-of: eventhub
    app.kubernetes.io/component: observability
    eventhub.io/role: observability
