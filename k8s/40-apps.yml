apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-authentication-service
  namespace: eventhub-app
  labels:
    app.kubernetes.io/name: user-authentication-service
    app.kubernetes.io/part-of: eventhub
    app.kubernetes.io/component: application
    eventhub.io/role: app
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: user-authentication-service
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-authentication-service
        app.kubernetes.io/part-of: eventhub
        app.kubernetes.io/component: application
        eventhub.io/role: app
    spec:
      initContainers:
        - name: wait-for-auth-db
          image: postgres:16
          command:
            - sh
            - -c
            - until pg_isready -h user-authentication-db-service.eventhub-data.svc.cluster.local -p 5432 -U auth_user -d auth_db; do sleep 2; done
      containers:
        - name: user-authentication-service
          image: eventhub/user-authentication-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
          env:
            - name: SERVER_PORT
              value: "8080"
            - name: SPRING_DATASOURCE_URL
              value: jdbc:postgresql://user-authentication-db-service.eventhub-data.svc.cluster.local:5432/auth_db
          envFrom:
            - secretRef:
                name: auth-db-secret
          readinessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health
              port: 8080
            initialDelaySeconds: 60
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: user-authentication-service
  namespace: eventhub-app
  labels:
    app.kubernetes.io/name: user-authentication-service
    app.kubernetes.io/part-of: eventhub
    app.kubernetes.io/component: application
    eventhub.io/role: app
spec:
  selector:
    app.kubernetes.io/name: user-authentication-service
  ports:
    - name: http
      port: 8080
      targetPort: 8080
---
