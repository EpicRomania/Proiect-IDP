apiVersion: v1
kind: ServiceAccount
metadata:
  name: portainer
  namespace: eventhub-management
  labels:
    app.kubernetes.io/name: portainer
    app.kubernetes.io/part-of: eventhub
    app.kubernetes.io/component: management
    eventhub.io/role: management
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: eventhub-portainer
  labels:
    app.kubernetes.io/name: portainer
    app.kubernetes.io/part-of: eventhub
    app.kubernetes.io/component: management
    eventhub.io/role: management
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: cluster-admin
subjects:
  - kind: ServiceAccount
    name: portainer
    namespace: eventhub-management
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: portainer-data
  namespace: eventhub-management
  labels:
    app.kubernetes.io/name: portainer
    app.kubernetes.io/part-of: eventhub
    app.kubernetes.io/component: management
    eventhub.io/role: management
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: adminer
  namespace: eventhub-management
  labels:
    app.kubernetes.io/name: adminer
    app.kubernetes.io/part-of: eventhub
    app.kubernetes.io/component: management
    eventhub.io/role: management
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: adminer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: adminer
        app.kubernetes.io/part-of: eventhub
        app.kubernetes.io/component: management
        eventhub.io/role: management
    spec:
      containers:
        - name: adminer
          image: adminer:4.8.1
          ports:
            - containerPort: 8080
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: adminer
  namespace: eventhub-management
  labels:
    app.kubernetes.io/name: adminer
    app.kubernetes.io/part-of: eventhub
    app.kubernetes.io/component: management
    eventhub.io/role: management
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: adminer
  ports:
    - name: http
      port: 8080
      targetPort: 8080
      nodePort: 30088
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: portainer
  namespace: eventhub-management
  labels:
    app.kubernetes.io/name: portainer
    app.kubernetes.io/part-of: eventhub
    app.kubernetes.io/component: management
    eventhub.io/role: management
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: portainer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: portainer
        app.kubernetes.io/part-of: eventhub
        app.kubernetes.io/component: management
        eventhub.io/role: management
    spec:
      serviceAccountName: portainer
      containers:
        - name: portainer
          image: portainer/portainer-ce:2.21.5
          args:
            - --http-enabled
          ports:
            - containerPort: 9000
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            httpGet:
              path: /api/status
              port: 9000
            initialDelaySeconds: 30
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/status
              port: 9000
            initialDelaySeconds: 60
            periodSeconds: 20
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: portainer-data
---
apiVersion: v1
kind: Service
metadata:
  name: portainer
  namespace: eventhub-management
  labels:
    app.kubernetes.io/name: portainer
    app.kubernetes.io/part-of: eventhub
    app.kubernetes.io/component: management
    eventhub.io/role: management
spec:
  type: NodePort
  selector:
    app.kubernetes.io/name: portainer
  ports:
    - name: http
      port: 9000
      targetPort: 9000
      nodePort: 30090
